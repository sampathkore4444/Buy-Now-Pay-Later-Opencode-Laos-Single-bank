version: "3.9"

services:
  bnpl-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    environment:
      - ENV=development
      - POSTGRES_HOST=bnpl-db
      - POSTGRES_USER=bnpl_user
      - POSTGRES_PASSWORD=bnpl_pass
      - POSTGRES_DB=bnpl_platform
      - CBS_STAGING_HOST=cbs-staging-db
      - CBS_STAGING_USER=bnpl_stg_writer
      - CBS_STAGING_PASSWORD=stg_pass
      - CBS_STAGING_DB=cbs_staging
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - bnpl-db
      - cbs-staging-db
      - redis
      - kafka
    volumes:
      - ./backend:/app
    networks:
      - bnpl-network

  bnpl-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=bnpl_user
      - POSTGRES_PASSWORD=bnpl_pass
      - POSTGRES_DB=bnpl_platform
    ports:
      - "5432:5432"
    volumes:
      - bnpl-db-data:/var/lib/postgresql/data
    networks:
      - bnpl-network

  cbs-staging-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=bnpl_stg_writer
      - POSTGRES_PASSWORD=stg_pass
      - POSTGRES_DB=cbs_staging
    ports:
      - "5433:5432"
    volumes:
      - cbs-staging-db-data:/var/lib/postgresql/data
    networks:
      - bnpl-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - bnpl-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
    networks:
      - bnpl-network

  kafka:
    image: confluentinc/cp-kafka:7.6
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=PLAINTEXT://kafka:9092
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    ports:
      - "9092:9092"
    networks:
      - bnpl-network

  kong:
    image: kong:3.7
    environment:
      - KONG_DATABASE=off
      - KONG_DECLARATIVE_CONFIG=/kong/kong.yml
      - KONG_PROXY_ACCESS_LOG=/dev/stdout
      - KONG_ADMIN_ACCESS_LOG=/dev/stdout
      - KONG_PROXY_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_ERROR_LOG=/dev/stderr
      - KONG_ADMIN_LISTEN=0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml
      - ./kong/kong-entrypoint.sh:/kong-entrypoint.sh
    networks:
      - bnpl-network

volumes:
  bnpl-db-data:
  cbs-staging-db-data:

networks:
  bnpl-network:
    driver: bridge
